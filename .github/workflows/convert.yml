name: Convert fietje-2-chat naar MLC (WebLLM)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLC-toolchain
        run: |
          pip install --pre -f https://mlc.ai/wheels mlc-llm-nightly-cpu mlc-ai-nightly-cpu
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install safetensors numpy huggingface_hub
          python -c "import mlc_llm; print('mlc_llm import OK')"

      - name: Download BramVanroy/fietje-2-chat
        run: hf download BramVanroy/fietje-2-chat --local-dir model --exclude "img/*"

      - name: Pad vocab 50297 -> 51200 (match met phi-2 wasm)
        run: python pad_vocab.py model

      - name: Convert weights (q4f16_1)
        run: python -m mlc_llm convert_weight model --quantization q4f16_1 -o out

      - name: Gen config (chatml, ctx 2048, prefill 1024)
        run: |
          python -m mlc_llm gen_config model --quantization q4f16_1 \
            --conv-template chatml \
            --context-window-size 2048 --prefill-chunk-size 1024 \
            -o out
          ls -la out | head -20
          cat out/mlc-chat-config.json

      - name: Push gewichten naar deze repo (map weights/)
        run: |
          rm -rf weights && mkdir weights
          cp out/*.bin out/*.json weights/
          for f in out/tokenizer* out/merges.txt out/vocab.json out/added_tokens.json; do
            [ -f "$f" ] && cp "$f" weights/ || true
          done
          du -sh weights
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weights
          git commit -m "MLC q4f16_1 gewichten (vocab gepadded naar 51200)"
          git push
